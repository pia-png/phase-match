<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase Match</title>
    <style>
        @font-face {
            font-family: "willow";
            src: url("Pia_font-Regular.otf") format("opentype");
        }

        .willow { font-family: "willow", serif; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0f19;
            font-family: 'willow', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #e2e8f0
        }

        #welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
    
            background: 
                linear-gradient(rgba(11, 15, 25, 0.85), rgba(11, 15, 25, 0.85)), 
                url('https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?q=80&w=2344&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); 

        background-size: cover;
        background-position: center;
    
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        z-index: 10;
        transition: opacity 0.6s ease, visibility 0.6s;
        }

        #welcome-title {
            font-size: 3.5rem;
            margin-bottom: 10px;
            letter-spacing: 5px;
            color: #fef09a;
            text-shadow: 0 0 25px rgba(254, 240, 154, 0.4);
        }

        #welcome-screen .hint {
            font-size: 1.2rem;
            opacity: 0.7;
            margin-top: 15px;
        }

        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #game-container.visible {
            opacity: 1;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #target-shadow {
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px dashed rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
            z-index: 1;
            top: 0px;
        }

        #player-moon {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: #fef09a;
            box-shadow: 0 0 40px rgba(254,240,138,0.6);
            z-index: 2;
            overflow: hidden;
        }

        #moon-shadow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19;
            border-radius: 50%;
            transform: translateX(100%)
        }

        #score-text {
            font-size: 2rem;
            margin-bottom: 20px;
            letter-spacing: 3px;
            color: #94a3b8;
        }

        #instructions {
            margin-top: 40px;
            font-size: 1.4rem;
            letter-spacing: 1px;
            line-height: 1.6;
            color: #e2e8f0
        }

        .hint {
            font-size: 1rem;
            opacity: 0.5;
            display: block;
        }

        .star-particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #fef09a;
            box-shadow: 0 0 10px #fef09a;
            pointer-events: none;
            animation: fallAndFade 1s forwards ease-out;
        }

        @keyframes fallAndFade {
            0% {
                opacity: 1;
                transform: translate(0px, 0px) scale(1);
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(0.2);
                opacity: 1;
            }
        }

.bg-star {
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: #ffffff;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
            box-shadow: 
                0 0 4px #ffffff, 
                0 0 12px #fef09a, 
                0 0 20px rgba(254, 240, 154, 0.4);
            animation: twinkleIn 0.4s ease-out forwards, deepTwinkle 3s infinite ease-in-out;
        }

        @keyframes twinkleIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes deepTwinkle {
            0%, 100% { 
                transform: scale(1); 
                box-shadow: 0 0 4px #ffffff, 0 0 12px #fef09a, 0 0 20px rgba(254, 240, 154, 0.4);
                opacity: 0.9;
            }
            50% { 
                transform: scale(0.7); 
                box-shadow: 0 0 2px #ffffff, 0 0 6px #fef09a, 0 0 10px rgba(254, 240, 154, 0.2);
                opacity: 0.4; /* Dims slightly to create a breathing night sky */
            }
        }



    </style>
</head>
<body>
    <div id="welcome-screen">
        <div id="welcome-title">Phase Match</div>
        <div class="hint">Press SPACEBAR to start</div>
    </div>

    <div id="game-container">
        <div id="score-text">Stars Caught: 0</div>
    
        <div style="position: relative; width: 200px; height: 200px; margin-top: 30px;">
            <div id="target-shadow"></div>
            <div id="player-moon">
                <div id="moon-shadow"></div>
            </div>
        </div>

        <div id="instructions">
            Press <strong>SPACEBAR</strong> to Catch the Phase 
            <span class="hint">Match the shadow with the dashed line</span>
        </div>
    </div>
</body>
<script>

let score = 0;
let shadowPosition = 100;
let direction = -1.5;
let targetPosition = 0;
let isGameOver = false;
let gameStarted = false;

const moonShadow = document.getElementById('moon-shadow');
const targetShadow = document.getElementById('target-shadow');
const scoreText = document.getElementById('score-text');
const instructions = document.getElementById('instructions');
const welcomeScreen = document.getElementById('welcome-screen');
const gameContainer = document.getElementById('game-container');

function generateNewTarget() {
    targetPosition = Math.floor(Math.random() * 160) - 80;
    targetShadow.style.transform = `translateX(${targetPosition}%)`;
    targetShadow.style.backgroundColor = '#0b0f19'

}

function spawnStars() {
    const container = document.getElementById('game-container');

    for (let i = 0; i < 10; i++) {
        const star = document.createElement('div');
        star.classList.add('star-particle');

        star.style.left = 'calc(50% - 4px)';
        star.style.top = '130px';

        const scatterX = (Math.random() - 0.5) * 200 + 'px';
        const scatterY = (Math.random() * 150) + 50 + 'px';

        star.style.setProperty('--x', scatterX);
        star.style.setProperty('--y', scatterY);

        container.appendChild(star);
        
        setTimeout(() => {
            star.remove();
        }, 1000);

    }
}

function addPermanentStar() {
    const star = document.createElement('div');
    star.classList.add('bg-star')

    const randomX = Math.random() * window.innerWidth + 'px';
    const randomY = Math.random() * window.innerHeight + 'px';

    star.style.left = randomX;
    star.style.top = randomY;

    document.body.appendChild(star);
}

function clearPermanentStars() {
    const stars = document.querySelectorAll('.bg-star');
    stars.forEach(star => star.remove());
}

generateNewTarget();

window.addEventListener('keydown', (event) => {
    if (event.code === 'Space') {
        event.preventDefault()

        if (!gameStarted) {
            gameStarted = true;
            welcomeScreen.classList.add('hidden');
            gameContainer.classList.add('visible');
            return;
        }
        
        if (isGameOver) {
            score = 0;
            scoreText.innerText = "Stars Caught: " + score
            direction = -1.5;
            isGameOver = false;
            instructions.innerText = "Press SPACEBAR when the phases align";
            clearPermanentStars();
            generateNewTarget();
            return;
        }

        let accuracy = Math.abs(shadowPosition - targetPosition);

        if (accuracy < 15) {
            score++;
            scoreText.innerText = "Stars Caught: " + score;
            
            spawnStars();
            addPermanentStar();

            if (direction > 0) direction += 0.2;
            else direction -= 0.2;

            generateNewTarget();
        } else {
            isGameOver = true;
            instructions.innerText = "The Moon Shattered! Press SPACEBAR to try again.";
        }
    }
});

function updateGame() {
    if (gameStarted && !isGameOver){ // Only moves if game is active
        shadowPosition += direction;
        if (shadowPosition < -100 || shadowPosition > 100) {
            direction *= -1;
        }
        moonShadow.style.transform = `translateX(${shadowPosition}%)`;
    }
    requestAnimationFrame(updateGame);
}

updateGame();

</script>
</html>
